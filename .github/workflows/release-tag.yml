name: Tag And Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (example: v1.0.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.version }}"
          git tag $tag
          git push origin $tag

      - name: Find newest .app package
        id: app_file
        shell: pwsh
        run: |
          $app = Get-ChildItem -Path . -Filter *.app -Recurse |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if ($null -eq $app) {
            "found=false" >> $env:GITHUB_OUTPUT
          }
          else {
            "found=true" >> $env:GITHUB_OUTPUT
            "path=$($app.FullName)" >> $env:GITHUB_OUTPUT
            "name=$($app.Name)" >> $env:GITHUB_OUTPUT
          }

      - name: Create release without app asset
        if: steps.app_file.outputs.found != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Clarity365 ${{ github.event.inputs.version }}
          generate_release_notes: true

      - name: Create release with app asset
        if: steps.app_file.outputs.found == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Clarity365 ${{ github.event.inputs.version }}
          generate_release_notes: true
          files: |
            ${{ steps.app_file.outputs.path }}
